<script>
        // Micro-interactions and Tab Switching Logic
        const tabs = document.querySelectorAll('nav button');
        const activeIndicator = document.querySelector('.active-tab-indicator');

        tabs.forEach((tab, index) => {
            tab.addEventListener('click', () => {
                tabs.forEach(t => {
                    t.classList.remove('text-primary', 'font-bold');
                    t.classList.add('text-on-surface-variant', 'opacity-70');
                    t.classList.remove('font-bold');
                });
                
                tab.classList.add('text-primary', 'font-bold');
                tab.classList.remove('text-on-surface-variant', 'opacity-70');

                // Move indicator
                activeIndicator.style.transform = `translateX(${index * 100}%)`;
                
                // Content display logic (mock)
                const usersTab = document.getElementById('users-tab');
                if (index === 1) {
                    usersTab.classList.add('opacity-30', 'pointer-events-none');
                } else {
                    usersTab.classList.remove('opacity-30', 'pointer-events-none');
                }
            });
        });

        // Search highlight interaction
        const searchInput = document.querySelector('input');
        const searchIcon = searchInput.previousElementSibling;

        searchInput.addEventListener('focus', () => {
            searchIcon.style.color = '#53e076';
        });
        searchInput.addEventListener('blur', () => {
            searchIcon.style.color = '';
        });
    </script>
