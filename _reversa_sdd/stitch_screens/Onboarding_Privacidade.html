<html class="dark" lang="pt-BR"><head>

        theme: {

              "primary-fixed-dim": "#53e076",

              "surface-bright": "#393939",
              "inverse-on-surface": "#313030",
              "on-tertiary": "#680114",
              "surface-container-high": "#2a2a2a",
              "secondary": "#99d59d",
              "tertiary-fixed": "#ffdad9",
              "secondary-container": "#1c5329",
              "primary-fixed": "#72fe8f",
              "on-background": "#e5e2e1",
              "surface-variant": "#353534",
              "on-secondary-container": "#8cc690",
              "surface-container-low": "#1c1b1b",
              "surface-container-lowest": "#0e0e0e",
              "on-tertiary-fixed": "#400009",
              "on-surface": "#e5e2e1",
              "secondary-fixed": "#b5f1b8",
              "on-primary-fixed-variant": "#005320",
              "on-error": "#690005",
              "outline": "#869585",
              "surface-tint": "#53e076",
              "secondary-fixed-dim": "#99d59d",
              "on-secondary-fixed-variant": "#195127",
              "on-primary": "#003914",
              "on-primary-container": "#000000", /* Bold black text on neon green */
              "on-error-container": "#ffdad6",
              "surface-dim": "#131313",
              "on-secondary": "#003914",
              "surface-container-highest": "#353534",
              "primary": "#53e076",
              "on-tertiary-container": "#730a1b",
              "on-tertiary-fixed-variant": "#881d28",
              "on-primary-fixed": "#002108",
              "surface": "#121212",
              "inverse-surface": "#e5e2e1",
              "error-container": "#93000a",
              "on-secondary-fixed": "#002108",
              "tertiary-fixed-dim": "#ffb3b3",
              "tertiary-container": "#ff767b",
              "error": "#ffb4ab",
              "surface-container": "#201f1f",
              "outline-variant": "#3d4a3d",
              "inverse-primary": "#006e2d"
            },
            borderRadius: {
              "DEFAULT": "0.25rem",
              "lg": "0.5rem",
              "xl": "0.75rem",
              "full": "9999px"
            },
            fontFamily: {
              "headline": ["Plus Jakarta Sans"],
              "display": ["Plus Jakarta Sans"],
              "body": ["Plus Jakarta Sans"],
              "label": ["Public Sans"]
            }
          }
        }
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }
        .material-symbols-outlined.fill {
            font-variation-settings: 'FILL' 1, 'wght' 400;
        }
        
        /* Custom Checkbox Animation */
        .premium-checkbox input:checked + div {
            background-color: #1db954; /* primary-container */
            border-color: #1db954;
        }
        .premium-checkbox input:checked + div svg {
            stroke-dashoffset: 0;
            opacity: 1;
        }
        .checkmark-svg {
            stroke-dasharray: 24;
            stroke-dashoffset: 24;
            transition: stroke-dashoffset 0.3s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.2s;
        }
        
        /* Logo Glow Animation */
        @keyframes subtleGlow {
            0%, 100% { box-shadow: 0 0 30px rgba(29, 185, 84, 0.15); }
            50% { box-shadow: 0 0 50px rgba(29, 185, 84, 0.35); }
        }
        .logo-glow {
            animation: subtleGlow 4s ease-in-out infinite;
        }
    </style>
</head>
<body class="bg-background text-on-surface font-body h-[100dvh] flex flex-col antialiased selection:bg-primary-container selection:text-on-primary-container overflow-hidden">
<!-- Top Action Bar (Custom for linear flow) -->
<header class="flex justify-end p-6 w-full z-10 shrink-0">
<button class="font-label text-sm uppercase tracking-widest text-on-surface-variant hover:text-on-surface transition-colors">
            Pular
        </button>
</header>
<!-- Main Scrollable Content Area -->
<main class="flex-1 flex flex-col justify-center items-center px-6 overflow-y-auto pb-4">
<!-- Glowing Logo -->
<div class="relative w-36 h-36 mb-10 rounded-full logo-glow flex items-center justify-center bg-surface-container-lowest p-2 border border-surface-container-high shrink-0">
<!-- decorative inner ring -->
<div class="absolute inset-0 rounded-full border border-primary-container/20 m-1"></div>
<img alt="FMA Pontos App Logo with vibrant glow" class="w-full h-full object-cover rounded-full z-10 drop-shadow-2xl" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBfwHsg2x47CJomrhH9U_gt8jAzkscpPoE_fjllv6L5emUEnRhSDU5dxguKCDemK09NqBSsKNDWrvfkTZfmKkK5MihFdZRn6XdiU4Aqq1Q67kKH-Qklcp1Nd4NtVVkWN3XIoiT2lmyQqOuciRvY0WqQR-KJnxd-no1Ygw4chOhPpGsyO-kdu6WC9owq2mYtDf4_UCfutKm3WoRi_FeY3id34Bwy5vFyalCD-e3LcZkfMqETxRu6sjg3FGn8SAIDDjCXDwK1zzgKmR0"/>
</div>
<!-- Typography Content -->
<div class="w-full max-w-md flex flex-col">
<h1 class="text-3xl font-headline font-extrabold tracking-tight text-center mb-8 bg-gradient-to-br from-white to-on-surface-variant bg-clip-text text-transparent">
                Privacidade e<br/>Sincronização
            </h1>
<!-- Feature Bullets -->
<ul class="space-y-6 mb-10">
<li class="flex items-start gap-4">
<div class="mt-0.5 w-8 h-8 rounded-full bg-surface-container flex items-center justify-center text-primary-container shrink-0">
<span class="material-symbols-outlined text-[20px]">account_circle</span>
</div>
<div>
<h3 class="font-headline font-bold text-base text-on-surface">Login do Google</h3>
<p class="font-body text-sm text-on-surface-variant mt-1 leading-relaxed">Apenas nome, e-mail e foto do avatar.</p>
</div>
</li>
<li class="flex items-start gap-4">
<div class="mt-0.5 w-8 h-8 rounded-full bg-surface-container flex items-center justify-center text-primary-container shrink-0">
<span class="material-symbols-outlined text-[20px]">database</span>
</div>
<div>
<h3 class="font-headline font-bold text-base text-on-surface">Armazenamento Local</h3>
<p class="font-body text-sm text-on-surface-variant mt-1 leading-relaxed">Suas letras e áudios são salvos no SQLite offline.</p>
</div>
</li>
<li class="flex items-start gap-4">
<div class="mt-0.5 w-8 h-8 rounded-full bg-surface-container flex items-center justify-center text-primary-container shrink-0">
<span class="material-symbols-outlined text-[20px]">visibility_off</span>
</div>
<div>
<h3 class="font-headline font-bold text-base text-on-surface">Sem Rastreamento</h3>
<p class="font-body text-sm text-on-surface-variant mt-1 leading-relaxed">Não coletamos CPF, telefone ou localização.</p>
</div>
</li>
</ul>
<!-- Agreement Card -->
<label class="premium-checkbox group relative flex items-start gap-4 p-4 rounded-xl bg-surface-container-low border border-surface-container-high hover:border-surface-variant cursor-pointer transition-colors w-full">
<input class="sr-only" id="privacy-check" type="checkbox"/>
<!-- Custom Checkbox Visual -->
<div class="mt-0.5 w-6 h-6 rounded-md border-2 border-outline-variant bg-surface flex items-center justify-center transition-all duration-200 group-hover:border-outline shrink-0">
<svg class="w-4 h-4 text-on-primary-container checkmark-svg opacity-0" fill="none" stroke="currentColor" stroke-width="3" viewbox="0 0 24 24">
<path d="M5 13l4 4L19 7" stroke-linecap="round" stroke-linejoin="round"></path>
</svg>
</div>
<span class="font-body text-sm text-on-surface-variant leading-tight pt-0.5 select-none transition-colors group-hover:text-on-surface">
                    Li e concordo com a <span class="text-on-surface font-semibold underline decoration-surface-variant underline-offset-4 group-hover:decoration-primary-container/50">Política de Privacidade</span> (v2026).
                </span>
</label>
</div>
</main>
<!-- Bottom Actions Sticky Area -->
<footer class="w-full shrink-0 pt-6 pb-10 px-6 bg-gradient-to-t from-background via-background to-transparent relative z-20">
<div class="max-w-md mx-auto flex flex-col items-center gap-8">
<!-- Pagination Dots -->
<div class="flex items-center gap-2">
<div class="h-1.5 w-1.5 rounded-full bg-surface-variant transition-all duration-300"></div>
<div class="h-1.5 w-6 rounded-full bg-primary-container transition-all duration-300"></div>
<div class="h-1.5 w-1.5 rounded-full bg-surface-variant transition-all duration-300"></div>
</div>
<!-- Primary Action Button -->
<button class="w-full py-4 px-6 rounded-full font-headline font-bold text-lg tracking-wide transition-all duration-300 ease-out flex justify-center items-center gap-2 bg-surface-container-high text-on-surface-variant opacity-50 cursor-not-allowed" disabled="" id="start-btn">
                Começar a usar
            </button>
</div>
</footer>
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const checkbox = document.getElementById('privacy-check');
            const startBtn = document.getElementById('start-btn');
            
            // Function to update button state
            const updateButtonState = () => {
                if (checkbox.checked) {
                    // Active State: Solid neon green (#1DB954) with bold black text
                    startBtn.disabled = false;
                    startBtn.classList.remove('bg-surface-container-high', 'text-on-surface-variant', 'opacity-50', 'cursor-not-allowed');
                    startBtn.classList.add('bg-primary-container', 'text-on-primary-container', 'shadow-[0_8px_30px_rgba(29,185,84,0.3)]', 'active:scale-95');
                } else {
                    // Inactive State: Grayed out/disabled appearance
                    startBtn.disabled = true;
                    startBtn.classList.add('bg-surface-container-high', 'text-on-surface-variant', 'opacity-50', 'cursor-not-allowed');
                    startBtn.classList.remove('bg-primary-container', 'text-on-primary-container', 'shadow-[0_8px_30px_rgba(29,185,84,0.3)]', 'active:scale-95');
                }
            };

            // Add listener to checkbox
            checkbox.addEventListener('change', updateButtonState);
            
            // Subtle interactive haptic feel on button click (visual only here)
            startBtn.addEventListener('click', (e) => {
                if(!startBtn.disabled) {
                    // Provide visual feedback for proceeding
                    const originalText = startBtn.innerHTML;
                    startBtn.innerHTML = '<span class="material-symbols-outlined animate-spin text-[24px]">sync</span>';
                    
                    // Simulate processing delay
                    setTimeout(() => {
                        startBtn.innerHTML = originalText;
                    }, 1000);
                }
            });
        });
    </script>
</body></html>
