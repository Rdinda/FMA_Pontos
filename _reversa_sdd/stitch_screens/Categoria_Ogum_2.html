<script>
        // Simple micro-interaction for playback state
        const playBtn = document.querySelector('.bg-primary-container');
        playBtn.addEventListener('click', () => {
            const icon = playBtn.querySelector('span');
            icon.innerText = icon.innerText === 'play_arrow' ? 'pause' : 'play_arrow';
        });

        // Add a subtle scroll listener for the header translucency
        window.addEventListener('scroll', () => {
            const header = document.querySelector('header');
            if (window.scrollY > 20) {
                header.classList.add('shadow-md');
            } else {
                header.classList.remove('shadow-md');
            }
        });
    </script>
