<script>
        // Simple scroll effect for Top App Bar
        window.addEventListener('scroll', () => {
            const topBar = document.getElementById('top-bar');
            if (window.scrollY > 50) {
                topBar.classList.add('bg-background/95', 'shadow-md');
                topBar.classList.remove('bg-background/80', 'shadow-none');
            } else {
                topBar.classList.add('bg-background/80', 'shadow-none');
                topBar.classList.remove('bg-background/95', 'shadow-md');
            }
        });
