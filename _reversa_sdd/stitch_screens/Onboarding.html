<body class="bg-background text-on-background font-body min-h-screen flex flex-col items-center justify-center overflow-hidden">
<!-- Ambient Background Blur -->

<div class="relative flex items-end gap-1 h-10">
<!-- Stylized Equalizer/Shield Hybrid -->

<span class="w-1.5 h-10 bg-white rounded-full"></span>
<span class="w-1.5 h-8 bg-white rounded-full animate-pulse" style="animation-delay: 0.2s"></span>
<span class="w-1.5 h-5 bg-white rounded-full"></span>

</div>
<h1 class="font-headline text-3xl font-extrabold tracking-tight text-on-background">
                Bem-vindo ao <span class="text-primary">FMA Pontos</span>
</h1>
</header>
<!-- Middle Part: Slide Content Card -->
<section class="w-full bg-surface-container-high rounded-xl p-6 shadow-xl border border-outline-variant/30 mb-auto">
<h2 class="text-xl font-bold mb-6 text-on-surface">Seus pontos sempre com você</h2>
<div class="space-y-6">
<!-- Feature 1 -->
<div class="flex items-start gap-4 group">
<div class="bg-secondary-container p-2.5 rounded-lg text-on-secondary-container transition-transform group-hover:scale-110">
<span class="material-symbols-outlined" data-icon="cloud_off">cloud_off</span>
</div>
<div>
<h3 class="font-bold text-on-surface-variant text-sm">Acesso Offline</h3>
<p class="text-sm text-on-surface-variant/70 leading-relaxed">Ouça e leia os pontos em locais sem sinal de internet.</p>
</div>
</div>
<!-- Feature 2 -->
<div class="flex items-start gap-4 group">
<div class="bg-secondary-container p-2.5 rounded-lg text-on-secondary-container transition-transform group-hover:scale-110">
<span class="material-symbols-outlined" data-icon="folder_open">folder_open</span>
</div>
<div>
<h3 class="font-bold text-on-surface-variant text-sm">Orixás &amp; Falanges</h3>
<p class="text-sm text-on-surface-variant/70 leading-relaxed">Telas limpas para cada linha de trabalho.</p>
</div>
</div>
<!-- Feature 3 -->
<div class="flex items-start gap-4 group">
<div class="bg-secondary-container p-2.5 rounded-lg text-on-secondary-container transition-transform group-hover:scale-110">

</div>
<div>
<h3 class="font-bold text-on-surface-variant text-sm">Busca Rápida</h3>
<p class="text-sm text-on-surface-variant/70 leading-relaxed">Ache letras instantaneamente durante a gira.</p>
</div>
</div>
</div>
</section>
<!-- Lower Part: Privacy & CTA -->
<footer class="w-full mt-12 space-y-8">
<!-- Indicators -->
<div class="flex justify-center items-center gap-2">
<div class="w-2 h-2 rounded-full bg-surface-variant"></div>
<div class="w-2 h-2 rounded-full bg-surface-variant"></div>
<div class="w-8 h-2 rounded-full bg-primary shadow-sm shadow-primary/50"></div>
</div>
<!-- Privacy Row -->
<div class="space-y-4">
<label class="flex items-start gap-3 cursor-pointer select-none">
<div class="relative flex items-center mt-1">
<input class="custom-checkbox h-5 w-5 rounded border-outline-variant bg-surface-container-highest text-primary focus:ring-primary focus:ring-offset-background transition-all" id="privacy-check" type="checkbox"/>
</div>
<div class="flex flex-col">
<span class="text-sm text-on-surface-variant leading-snug">Li e aceito a Política de Privacidade e Termos de Uso.</span>
<a class="text-primary text-sm font-semibold underline underline-offset-4 hover:text-primary-fixed-dim transition-colors mt-1" href="#">
                            Ler termos na íntegra
                        </a>
</div>
</label>
</div>
<!-- Primary CTA -->
<button class="w-full bg-primary text-on-primary font-bold py-4 px-6 rounded-xl text-lg glow-button transition-all active:scale-95 disabled:opacity-50 disabled:grayscale disabled:cursor-not-allowed" disabled="" id="start-button">
                Começar a usar
            </button>
</footer>
</main>
<script>
        // Simple logic for the onboarding checkbox
        const checkbox = document.getElementById('privacy-check');
        const startBtn = document.getElementById('start-button');

        checkbox.addEventListener('change', (e) => {
            startBtn.disabled = !e.target.checked;
            if (e.target.checked) {
                startBtn.classList.remove('opacity-50', 'grayscale');
            } else {
                startBtn.classList.add('opacity-50', 'grayscale');
            }
        });

        startBtn.addEventListener('click', () => {
            if (!startBtn.disabled) {
                // Micro-interaction: button click effect
                startBtn.innerHTML = '<span class="flex items-center justify-center gap-2"><span class="w-5 h-5 border-2 border-on-primary border-t-transparent rounded-full animate-spin"></span> Carregando...</span>';
                setTimeout(() => {
                    alert('Bem-vindo à experiência FMA Pontos!');
                    location.reload();
                }, 1500);
            }
        });
    </script>
