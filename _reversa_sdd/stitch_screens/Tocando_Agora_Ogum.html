<style>
        body {
            -webkit-tap-highlight-color: transparent;
        }
        
        /* Custom range slider styling */
        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
        }

        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 12px;
            width: 12px;
            border-radius: 50%;
            background: #ffffff;
            cursor: pointer;
            margin-top: -4px;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
            transition: transform 0.1s;
        }
        
        input[type=range]:active::-webkit-slider-thumb {
            transform: scale(1.3);
        }

        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 4px;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 2px;
        }
        
        /* Fake progress fill using gradient */
        .range-slider-wrapper {
            position: relative;
            width: 100%;
        }
        
        .range-progress-fill {
            position: absolute;
            top: 50%;
            left: 0;
            height: 4px;
            transform: translateY(-50%);
            background-color: #1db954; /* Explicitly use the neon green */
            border-radius: 2px;
            pointer-events: none;
        }
        
        /* Glowing shadow for album art */
        .album-art-shadow {
            box-shadow: 0 20px 40px -10px rgba(0,0,0,0.7), 0 0 40px -10px rgba(255,255,255,0.05);
        }
        
        /* Typography utilities */
        .text-neon {
            color: #1db954;
        }
        .bg-neon {
            background-color: #1db954;
        }
        
        /* Safe area padding for mobile */
        .pb-safe {
            padding-bottom: env(safe-area-inset-bottom, 20px);
        }
        .pt-safe {
            padding-top: env(safe-area-inset-top, 20px);
        }
    </style>
</head>
<body class="bg-background text-on-surface font-body h-screen flex flex-col overflow-hidden selection:bg-primary/30 antialiased pt-safe">
<!-- Top App Bar (Header) -->
<header class="w-full px-6 py-4 flex justify-between items-center bg-background/90 backdrop-blur-md z-10 shrink-0">
<button aria-label="Collapse" class="text-on-surface hover:text-primary transition-colors p-2 -ml-2 rounded-full active:scale-90">

<div class="flex flex-col items-center">

</div>

<!-- Overlay subtle gradient for depth -->

</div>

<!-- Track Info Section -->
<div class="flex justify-between items-end mb-6 sm:mb-8 w-full max-w-[400px] mx-auto mt-auto">

<p class="font-headline text-lg text-on-surface-variant/70 text-center transition-colors">Seu General de Umbanda...</p>
</div>
</div>
</div>
<script>
        // Simple script to update the fake progress bar width when slider moves
        document.addEventListener('DOMContentLoaded', () => {
            const slider = document.getElementById('progress-slider');
            const fill = document.querySelector('.range-progress-fill');
            
            if (slider && fill) {
                slider.addEventListener('input', (e) => {
                    fill.style.width = `${e.target.value}%`;
                });
            }
        });
    </script>
