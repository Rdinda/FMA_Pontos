<body class="bg-background text-on-background font-body antialiased min-h-screen flex flex-col pb-32 selection:bg-primary/30 selection:text-primary">
<!-- Top Navigation Anchor (Web) / Header Anchor (Mobile) -->
<!-- Although the prompt asked for "Painel Administrativo" with a back arrow, 
         the system instructions dictate applying TopAppBar if present in JSON.

         as it's a specific page content override, maintaining the shell classes. -->
<header class="bg-background/80 backdrop-blur-md docked full-width top-0 sticky z-40 flex justify-between items-center w-full px-6 py-4 flat no shadows">
<div class="flex items-center gap-4">
<button aria-label="Voltar" class="text-on-background hover:text-primary transition-colors active:scale-95 transition-transform">
<span class="material-symbols-outlined text-2xl">arrow_back</span>
</button>
<h1 class="text-primary font-display font-black text-2xl tracking-tighter">Painel Administrativo</h1>
</div>
<div class="flex items-center">
<!-- Trailing icon from JSON -->
<button class="text-on-background hover:opacity-80 transition-opacity active:scale-95 transition-transform">
<span class="material-symbols-outlined text-2xl">settings</span>
</button>
</div>
</header>
<main class="flex-grow container mx-auto px-4 sm:px-6 lg:px-8 max-w-4xl py-6">

<nav aria-label="Tabs" class="flex border-b border-surface-variant mb-6">
<button class="px-6 py-3 border-b-2 border-primary text-primary font-headline font-semibold text-sm mr-4 tracking-wide transition-colors">
                Usuários
            </button>
<button class="px-6 py-3 border-b-2 border-transparent text-on-surface-variant hover:text-on-background font-headline font-medium text-sm tracking-wide transition-colors">
                Logs de Auditoria
            </button>
</nav>
<!-- Search Bar -->
<div class="relative mb-8 group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-on-surface-variant group-focus-within:text-primary transition-colors">
<span class="material-symbols-outlined text-xl">search</span>
</div>
<input class="block w-full pl-12 pr-4 py-3 bg-surface-variant border-none rounded-xl text-on-background placeholder-on-surface-variant focus:ring-2 focus:ring-primary focus:bg-surface-container-highest transition-all font-body text-sm" placeholder="Buscar usuários por e-mail, nome ou cargo..." type="text"/>
</div>
<!-- User List (Bento-style list cards) -->
<div class="space-y-3">
<!-- User 1: Admin (Active) -->
<div class="flex items-center justify-between p-4 bg-surface-variant hover:bg-surface-container-highest rounded-xl transition-colors group cursor-pointer border border-transparent hover:border-surface-container-highest">

</div>
<div>
<p class="font-headline font-semibold text-on-background text-sm group-hover:text-primary transition-colors">admin@fmapontos.com</p>
<div class="flex items-center gap-2 mt-1">
<span class="inline-flex items-center px-2 py-0.5 rounded text-xs font-bold bg-primary text-on-primary">Admin</span>
<span class="text-xs text-on-surface-variant">Ativo</span>
</div>
</div>
</div>
<button class="text-on-surface-variant hover:text-on-background opacity-0 group-hover:opacity-100 transition-opacity p-2">
<span class="material-symbols-outlined">more_vert</span>
</button>
</div>
<!-- User 2: Moderador (Active) -->
<div class="flex items-center justify-between p-4 bg-surface-variant hover:bg-surface-container-highest rounded-xl transition-colors group cursor-pointer border border-transparent hover:border-surface-container-highest">
<div class="flex items-center gap-4">
<div class="relative">
<img alt="Moderator Avatar" class="w-12 h-12 rounded-full object-cover shadow-md" data-alt="A portrait of a moderator in a sleek, dimly lit studio setting. Subtle blue and purple ambient lights mix with a core neon green glow. The aesthetic matches a high-end music streaming application's dark mode. The subject appears focused and approachable." src="https://lh3.googleusercontent.com/aida-public/AB6AXuA63Kwqx89LILQPQerYwYobwD3KB0gVAVa-ffK8bUDQcN_aDaBzneWh-Utza1dg3NclLsy_sMeKdOhmP8k3IvUOvQVt6YEZ3y-Q9yvIVhFqlh0X4byoF84_FP-2qKWQRcKriWbWBoP_eU4HXUHyDHOk_Ty5sUyQUe7__S7HmcC0cZ9R2mfGFZXDAdsQNx2WlYoGgLakBe7uA3qJS6pFR_0-6iAl1XXMifGqfajIp3q7ldMr4PmZK-Iu9YUIVYcrrBRTuRSNqeej7IM"/>
<span class="absolute bottom-0 right-0 block h-3 w-3 rounded-full bg-primary ring-2 ring-surface-variant"></span>
</div>
<div>
<p class="font-headline font-medium text-on-background text-sm group-hover:text-primary transition-colors">roberto.dinda@gmail.com</p>
<div class="flex items-center gap-2 mt-1">
<span class="inline-flex items-center px-2 py-0.5 rounded text-xs font-semibold bg-indigo-500/20 text-indigo-300 border border-indigo-500/30">Moderador</span>
<span class="text-xs text-on-surface-variant">Ativo</span>
</div>
</div>
</div>
<button class="text-on-surface-variant hover:text-on-background opacity-0 group-hover:opacity-100 transition-opacity p-2">
<span class="material-symbols-outlined">more_vert</span>
</button>
</div>
<!-- User 3: Inativo (Inactive/Greyed out) -->
<div class="flex items-center justify-between p-4 bg-surface-variant/50 rounded-xl border border-transparent opacity-60 hover:opacity-80 transition-opacity">

<div class="relative">
<div class="w-12 h-12 rounded-full bg-surface-container-highest flex items-center justify-center text-on-surface-variant">
<span class="material-symbols-outlined">person_off</span>
</div>
</div>
<div>
<p class="font-headline font-medium text-on-surface-variant text-sm line-through">usuario.inativo@gmail.com</p>

<span class="inline-flex items-center px-2 py-0.5 rounded text-xs font-medium bg-surface-container-highest text-on-surface-variant">User</span>

<button class="text-on-surface-variant hover:text-on-background p-2">

</button>

</div>

<div class="h-full bg-primary w-1/3"></div>
</div>
<div class="flex items-center gap-3">
<div class="w-12 h-12 rounded-lg bg-surface-variant overflow-hidden shadow-sm relative group cursor-pointer flex-shrink-0">
<div class="w-full h-full bg-gradient-to-br from-indigo-900 to-black"></div>

<span class="material-symbols-outlined filled text-white text-xl">play_arrow</span>
</div>
</div>
<div class="flex-grow min-w-0">
<p class="text-xs font-headline font-bold text-on-background truncate">Ponto de Defumação</p>
<p class="text-[10px] text-on-surface-variant truncate">Caboclo Sete Flechas</p>

<div class="flex items-center gap-1 pr-2 flex-shrink-0">
<button class="p-2 text-on-surface-variant hover:text-primary transition-colors">
<span class="material-symbols-outlined text-sm">favorite</span>

<button class="p-2 text-on-background hover:text-primary transition-colors active:scale-90 rounded-full hover:bg-surface-variant">
<span class="material-symbols-outlined filled text-xl">play_arrow</span>
</button>

</div>
</div>

<nav class="bg-surface-dim/95 dark:bg-surface-dim/95 border-t border-outline-variant/30 backdrop-blur-lg shadow-lg fixed bottom-0 left-0 w-full z-50 flex justify-around items-center pt-2 pb-safe px-4 md:hidden">

<span class="material-symbols-outlined text-2xl group-hover:mb-1 transition-all">home</span>
<span class="font-label text-label-small font-medium text-[10px] mt-1">Início</span>
</a>
<a class="flex flex-col items-center justify-center text-on-surface-variant dark:text-on-surface-variant hover:text-primary-fixed-dim transition-colors active:scale-90 duration-150 p-2 group" href="#">
<span class="material-symbols-outlined text-2xl group-hover:mb-1 transition-all">search</span>
<span class="font-label text-label-small font-medium text-[10px] mt-1">Busca</span>
</a>
<a class="flex flex-col items-center justify-center text-on-surface-variant dark:text-on-surface-variant hover:text-primary-fixed-dim transition-colors active:scale-90 duration-150 p-2 group" href="#">
<span class="material-symbols-outlined text-2xl group-hover:mb-1 transition-all">favorite</span>
<span class="font-label text-label-small font-medium text-[10px] mt-1">Favoritos</span>
</a>
<!-- Active Tab: Admin -->
<a class="flex flex-col items-center justify-center text-primary dark:text-primary hover:text-primary-fixed-dim transition-colors active:scale-90 duration-150 p-2 relative" href="#">
<span class="absolute -top-1 w-8 h-1 bg-primary rounded-full shadow-[0_0_8px_rgba(29,185,84,0.6)]"></span>
<span class="material-symbols-outlined filled text-2xl mb-1">admin_panel_settings</span>
<span class="font-label text-label-small font-bold text-[10px]">Admin</span>
</a>
</nav>

<style>
        .pb-safe { padding-bottom: env(safe-area-inset-bottom, 16px); }
